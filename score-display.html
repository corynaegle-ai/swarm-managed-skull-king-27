<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Display - Skull King</title>
    <link rel="stylesheet" href="css/score-display.css">
</head>
<body>
    <div class="score-display-wrapper">
        <header class="score-display-header">
            <h1>Game Scores</h1>
            <p class="score-display-subtitle">Current Player Rankings</p>
        </header>

        <main class="score-display-main">
            <div id="scores-container" class="scores-container">
                <!-- Score cards will be dynamically inserted here -->
            </div>
        </main>

        <footer class="score-display-footer">
            <p>Scores update in real-time as rounds are played</p>
        </footer>
    </div>

    <script src="js/scoreDisplay.js"></script>
</body>
</html>
