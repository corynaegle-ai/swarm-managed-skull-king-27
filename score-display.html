<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Score Display - Real-time player scoring and leader tracking">
  <title>Score Display - Game Scores</title>
  <link rel="stylesheet" href="css/score-display.css">
</head>
<body>
  <div class="score-display-wrapper">
    <!-- Header Section -->
    <header class="score-display-header">
      <h1>Game Scores</h1>
      <p class="score-display-subtitle">Real-time scoring and leader tracking</p>
    </header>

    <!-- Main Score Display Section -->
    <main class="score-display-main">
      <!-- Scores Container - Player cards will be rendered here -->
      <div class="scores-container" id="scores-container">
        <!-- Player score cards will be dynamically inserted here -->
        <div style="color: white; text-align: center; padding: 2rem;">
          Loading scores...
        </div>
      </div>
    </main>

    <!-- Footer Section -->
    <footer class="score-display-footer">
      <p>Last updated: <span id="last-updated">--:--:--</span></p>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="js/scoreDisplay.js"></script>
  <script>
    // Initialize score display when DOM is ready
    document.addEventListener('DOMContentLoaded', function() {
      // Create instance of ScoreDisplay
      const scoreDisplay = new ScoreDisplay('scores-container');

      // Sample player data - replace with actual game data
      const samplePlayers = [
        { id: 1, name: 'Alice', score: 450 },
        { id: 2, name: 'Bob', score: 380 },
        { id: 3, name: 'Charlie', score: 520 },
        { id: 4, name: 'Diana', score: 410 }
      ];

      // Initialize with sample data
      scoreDisplay.init(samplePlayers);

      // Listen for updates
      scoreDisplay.onUpdate(function(data) {
        updateLastModifiedTime();
      });

      // Update the last-modified timestamp
      function updateLastModifiedTime() {
        const now = new Date();
        const timeString = now.toLocaleTimeString('en-US', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: true
        });
        document.getElementById('last-updated').textContent = timeString;
      }

      // Initial timestamp
      updateLastModifiedTime();

      // Example: Simulate score updates every 5 seconds
      // Remove this in production and integrate with actual game logic
      if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1') {
        setInterval(function() {
          const randomPlayer = samplePlayers[Math.floor(Math.random() * samplePlayers.length)];
          const scoreIncrease = Math.floor(Math.random() * 50) + 10;
          randomPlayer.score += scoreIncrease;
          scoreDisplay.updatePlayerScore(randomPlayer.id, randomPlayer.score);
        }, 5000);
      }

      // Expose scoreDisplay to window for debugging/integration
      window.scoreDisplay = scoreDisplay;
    });
  </script>
</body>
</html>
