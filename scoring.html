<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoring - Skull King</title>
    <link rel="stylesheet" href="css/scoring.css">
</head>
<body>
    <div class="scoring-container">
        <header class="scoring-header">
            <h1>Round Scoring</h1>
            <p class="round-info" id="roundInfo">Round 1</p>
        </header>

        <form id="scoringForm" class="scoring-form">
            <div class="players-grid" id="playersGrid">
                <!-- Player scoring cards will be dynamically inserted here -->
            </div>

            <div class="form-actions">
                <button type="button" id="prevRoundBtn" class="btn btn-secondary" disabled>
                    Previous Round
                </button>
                <button type="submit" id="nextRoundBtn" class="btn btn-primary" disabled>
                    Next Round
                </button>
            </div>
        </form>
    </div>

    <script src="js/scoring.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            initializeScoringInterface();
        });

        function initializeScoringInterface() {
            // Get players data from sessionStorage or use default test data
            let players = JSON.parse(sessionStorage.getItem('players')) || [
                { name: 'Player 1', bid: 2 },
                { name: 'Player 2', bid: 3 },
                { name: 'Player 3', bid: 1 },
                { name: 'Player 4', bid: 4 }
            ];

            const playersGrid = document.getElementById('playersGrid');
            const scoringForm = document.getElementById('scoringForm');
            const nextRoundBtn = document.getElementById('nextRoundBtn');
            const prevRoundBtn = document.getElementById('prevRoundBtn');
            const roundInfo = document.getElementById('roundInfo');

            const currentRound = parseInt(sessionStorage.getItem('currentRound')) || 1;
            roundInfo.textContent = `Round ${currentRound}`;

            // Create scoring cards for each player
            players.forEach((player, index) => {
                const maxTricks = currentRound; // Tricks can be 0 to current round number
                const card = createPlayerScoringCard(player, index, maxTricks);
                playersGrid.appendChild(card);
            });

            // Add form validation
            const inputs = scoringForm.querySelectorAll('input[type="number"]');
            
            function validateForm() {
                let allFilled = true;
                inputs.forEach(input => {
                    if (input.classList.contains('tricks-input')) {
                        if (input.value === '' || input.value === null) {
                            allFilled = false;
                        }
                    }
                });
                nextRoundBtn.disabled = !allFilled;
                return allFilled;
            }

            // Add event listeners to all inputs
            inputs.forEach(input => {
                input.addEventListener('input', function() {
                    validateForm();
                    updateCalculatedScore(this);
                });
                input.addEventListener('change', validateForm);
            });

            // Handle form submission
            scoringForm.addEventListener('submit', function(e) {
                e.preventDefault();
                if (validateForm()) {
                    collectScores();
                }
            });

            // Previous round button (placeholder)
            prevRoundBtn.addEventListener('click', function() {
                if (currentRound > 1) {
                    sessionStorage.setItem('currentRound', currentRound - 1);
                    window.location.reload();
                }
            });
        }

        function createPlayerScoringCard(player, index, maxTricks) {
            const card = document.createElement('div');
            card.className = 'player-card';
            card.innerHTML = `
                <div class="card-header">
                    <h2 class="player-name">${escapeHtml(player.name)}</h2>
                    <div class="bid-display">Bid: <span class="bid-value">${player.bid}</span></div>
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label for="tricks-${index}">Tricks Taken</label>
                        <input 
                            type="number" 
                            id="tricks-${index}" 
                            class="tricks-input" 
                            name="tricks-${index}"
                            min="0" 
                            max="${maxTricks}" 
                            placeholder="0"
                            aria-label="Tricks taken for ${player.name}"
                            required
                        />
                    </div>
                    <div class="form-group">
                        <label for="bonus-${index}">Bonus Points</label>
                        <input 
                            type="number" 
                            id="bonus-${index}" 
                            class="bonus-input" 
                            name="bonus-${index}"
                            value="0" 
                            min="0"
                            placeholder="0"
                            aria-label="Bonus points for ${player.name}"
                        />
                    </div>
                    <div class="score-display">
                        <label>Calculated Score</label>
                        <div class="score-value" id="score-${index}">-</div>
                    </div>
                </div>
                <input type="hidden" class="player-bid" value="${player.bid}" />
            `;
            return card;
        }

        function updateCalculatedScore(input) {
            const card = input.closest('.player-card');
            const tricksInput = card.querySelector('.tricks-input');
            const bonusInput = card.querySelector('.bonus-input');
            const bidInput = card.querySelector('.player-bid');
            const scoreDisplay = card.querySelector('.score-value');

            const tricks = parseInt(tricksInput.value) || null;
            const bonus = parseInt(bonusInput.value) || 0;
            const bid = parseInt(bidInput.value) || 0;

            if (tricks !== null) {
                // Simple scoring: if tricks match bid, add bonus; otherwise subtract
                const baseScore = tricks === bid ? 10 + (tricks * 5) : -5;
                const totalScore = baseScore + bonus;
                scoreDisplay.textContent = totalScore;
                scoreDisplay.className = 'score-value ' + (totalScore >= 0 ? 'positive' : 'negative');
            } else {
                scoreDisplay.textContent = '-';
                scoreDisplay.className = 'score-value';
            }
        }

        function collectScores() {
            const form = document.getElementById('scoringForm');
            const playersCards = form.querySelectorAll('.player-card');
            const scores = [];

            playersCards.forEach((card, index) => {
                const playerName = card.querySelector('.player-name').textContent;
                const bid = parseInt(card.querySelector('.player-bid').value);
                const tricks = parseInt(card.querySelector('.tricks-input').value);
                const bonus = parseInt(card.querySelector('.bonus-input').value) || 0;
                const scoreDisplay = card.querySelector('.score-value').textContent;
                const score = scoreDisplay !== '-' ? parseInt(scoreDisplay) : 0;

                scores.push({
                    name: playerName,
                    bid: bid,
                    tricks: tricks,
                    bonus: bonus,
                    score: score
                });
            });

            // Store scores in sessionStorage
            const allScores = JSON.parse(sessionStorage.getItem('scores')) || {};
            const currentRound = sessionStorage.getItem('currentRound') || 1;
            allScores[`round${currentRound}`] = scores;
            sessionStorage.setItem('scores', JSON.stringify(allScores));

            // Navigate to next round or game end
            const currentRound = parseInt(sessionStorage.getItem('currentRound')) || 1;
            const maxRounds = 13; // Standard Skull King is 13 rounds
            if (currentRound < maxRounds) {
                sessionStorage.setItem('currentRound', currentRound + 1);
                window.location.href = 'bidding.html';
            } else {
                window.location.href = 'results.html';
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
