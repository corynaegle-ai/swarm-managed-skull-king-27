<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoring - Skull King</title>
    <link rel="stylesheet" href="css/scoring.css">
</head>
<body>
    <div class="scoring-container">
        <header class="scoring-header">
            <h1>Round Scoring</h1>
            <p class="round-info" id="roundInfo">Round 1</p>
        </header>

        <form id="scoringForm" class="scoring-form">
            <div class="players-grid" id="playersGrid">
                <!-- Player scoring cards will be dynamically inserted here -->
            </div>

            <div class="form-actions">
                <button type="button" id="prevRoundBtn" class="btn btn-secondary" disabled>
                    Previous Round
                </button>
                <button type="submit" id="nextRoundBtn" class="btn btn-primary" disabled>
                    Next Round
                </button>
            </div>
        </form>
    </div>

    <script src="js/scoring.js"></script>
</body>
</html>
