<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scoring - Bid Game</title>
  <link rel="stylesheet" href="css/scoring.css">
</head>
<body>
  <div class="scoring-container">
    <header class="scoring-header">
      <h1>Round Scoring</h1>
      <p class="round-info">Enter tricks taken and bonus points for each player</p>
    </header>

    <form class="scoring-form" id="scoringForm">
      <div class="players-grid" id="playersGrid">
        <!-- Player cards will be generated by JavaScript -->
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" id="backBtn">Back to Bidding</button>
        <button type="submit" class="btn btn-primary" id="submitBtn">Submit Scores</button>
      </div>
    </form>

    <div class="round-navigation">
      <button type="button" class="btn btn-nav" id="prevRoundBtn">← Previous Round</button>
      <span class="round-display" id="roundInfo">Round 1</span>
      <button type="button" class="btn btn-nav" id="nextRoundBtn">Next Round →</button>
    </div>
  </div>

  <script src="js/scoring.js"></script>
</body>
</html>
