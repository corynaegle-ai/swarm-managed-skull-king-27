<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scoring - Bid Game</title>
  <link rel="stylesheet" href="css/scoring.css">
</head>
<body>
  <div class="scoring-container">
    <div class="scoring-header">
      <h1>Round Scoring</h1>
      <div class="round-info">Enter tricks taken and bonus points for each player</div>
    </div>

    <form class="scoring-form" id="scoringForm">
      <div class="players-grid" id="playersGrid">
        <!-- Player cards will be generated by JavaScript -->
        <div class="player-card">
          <div class="player-name">Player 1</div>
          <div class="bid-display">
            <span class="bid-label">Bid:</span>
            <span class="bid-value">3</span>
          </div>
          
          <div class="form-group">
            <label for="tricks-1">
              <span>Tricks Taken</span>
              <span class="input-hint">(0-13)</span>
            </label>
            <input type="number" id="tricks-1" name="tricks-1" min="0" max="13" value="0" required>
          </div>

          <div class="form-group">
            <label for="bonus-1">
              <span>Bonus Points</span>
              <span class="input-hint">Optional</span>
            </label>
            <input type="number" id="bonus-1" name="bonus-1" min="0" value="0">
          </div>

          <div class="score-display">
            <div class="score-label">Total Score</div>
            <div class="score-value">0</div>
          </div>
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn-secondary" id="backBtn">Back to Bidding</button>
        <button type="submit" class="btn btn-primary" id="submitBtn">Submit Scores</button>
      </div>
    </form>
  </div>

  <script src="js/scoring.js"></script>
</body>
</html><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoring - Card Game</title>
    <link rel="stylesheet" href="css/scoring.css">
</head>
<body>
    <div class="scoring-container">
        <header class="scoring-header">
            <h1>Round Scoring</h1>
            <p class="round-info">Enter tricks taken and bonus points for each player</p>
        </header>

        <form class="scoring-form">
            <div class="players-grid" id="playersGrid">
                <!-- Player cards will be populated here -->
                <div class="player-card">
                    <h2 class="player-name">Player Name</h2>
                    
                    <div class="bid-display">
                        <span class="bid-label">Bid:</span>
                        <span class="bid-value">5</span>
                    </div>

                    <div class="form-group">
                        <label for="tricks-player-1">
                            <span>Tricks Taken</span>
                            <span class="input-hint">(0-5)</span>
                        </label>
                        <input
                            type="number"
                            id="tricks-player-1"
                            name="tricks-1"
                            min="0"
                            max="5"
                            value="0"
                            required
                            aria-label="Tricks taken by player"
                        >
                    </div>

                    <div class="form-group">
                        <label for="bonus-player-1">
                            <span>Bonus Points</span>
                            <span class="input-hint">Optional</span>
                        </label>
                        <input
                            type="number"
                            id="bonus-player-1"
                            name="bonus-1"
                            min="0"
                            value="0"
                            aria-label="Bonus points for player"
                        >
                    </div>

                    <div class="score-display">
                        <div class="score-label">Total Score</div>
                        <div class="score-value">15</div>
                    </div>
                </div>
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="goBack()">
                    Back to Bidding
                </button>
                <button type="submit" class="btn btn-primary">
                    Submit Scores
                </button>
            </div>
        </form>
    </div>

    <script>
        // Placeholder for JavaScript functionality
        function goBack() {
            // Navigate back to bidding page
            window.history.back();
        }

        // Form submission handler
        document.querySelector('.scoring-form').addEventListener('submit', function(e) {
            e.preventDefault();
            // Handle score submission
            console.log('Scores submitted');
        });

        // Calculate score when inputs change
        document.addEventListener('change', function(e) {
            if (e.target.type === 'number') {
                // Recalculate score for the player card
                const card = e.target.closest('.player-card');
                if (card) {
                    updateScore(card);
                }
            }
        });

        function updateScore(playerCard) {
            const bidValue = parseInt(playerCard.querySelector('.bid-value').textContent);
            const tricksInput = playerCard.querySelector('input[name*="tricks"]');
            const bonusInput = playerCard.querySelector('input[name*="bonus"]');
            const scoreDisplay = playerCard.querySelector('.score-value');

            const tricks = parseInt(tricksInput.value) || 0;
            const bonus = parseInt(bonusInput.value) || 0;

            // Simple scoring: bid * 10 + tricks + bonus
            const score = (bidValue * 10) + tricks + bonus;
            scoreDisplay.textContent = score;
        }
    </script>
</body>
</html><!DOCTYPE html>
