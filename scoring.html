<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoring - Tricks Game</title>
    <link rel="stylesheet" href="css/scoring.css">
</head>
<body>
    <div class="scoring-container">
        <header class="scoring-header">
            <h1>Round Scoring</h1>
            <p class="round-info">Enter tricks taken and bonus points for each player</p>
        </header>

        <form class="scoring-form" id="scoringForm">
            <div class="players-grid" id="playersGrid">
                <!-- Player cards will be populated by JavaScript -->
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-secondary" id="resetBtn">Reset</button>
                <button type="submit" class="btn btn-primary" id="submitBtn">Submit Scores</button>
            </div>
        </form>

        <div class="round-navigation">
            <button class="btn btn-nav" id="prevRoundBtn" disabled>← Previous Round</button>
            <div class="round-display" id="roundDisplay">Round 1 of <span id="totalRounds">13</span></div>
            <button class="btn btn-nav" id="nextRoundBtn" disabled>Next Round →</button>
        </div>
    </div>

    <script>
        // Mock player data - in a real app, this would come from previous game state
        const players = [
            { id: 1, name: 'Player 1', bid: 3, handCount: 5 },
            { id: 2, name: 'Player 2', bid: 2, handCount: 5 },
            { id: 3, name: 'Player 3', bid: 4, handCount: 5 },
            { id: 4, name: 'Player 4', bid: 1, handCount: 5 }
        ];

        let currentRound = 1;
        const totalRounds = 13;
        const scores = {};

        // Initialize the form with player cards
        function initializeForm() {
            const playersGrid = document.getElementById('playersGrid');
            playersGrid.innerHTML = '';

            players.forEach(player => {
                const playerCard = createPlayerCard(player);
                playersGrid.appendChild(playerCard);
                
                // Initialize score tracking
                if (!scores[player.id]) {
                    scores[player.id] = { tricks: 0, bonus: 0, score: 0 };
                }
            });
        }

        // Create individual player card
        function createPlayerCard(player) {
            const card = document.createElement('div');
            card.className = 'player-card';
            card.dataset.playerId = player.id;

            const playerName = document.createElement('div');
            playerName.className = 'player-name';
            playerName.textContent = player.name;

            const bidDisplay = document.createElement('div');
            bidDisplay.className = 'bid-display';
            bidDisplay.innerHTML = `<span class="bid-label">Bid:</span><span class="bid-value">${player.bid}</span>`;

            const tricksGroup = document.createElement('div');
            tricksGroup.className = 'form-group';
            tricksGroup.innerHTML = `
                <label for="tricks-${player.id}">Tricks Taken</label>
                <input 
                    type="number" 
                    id="tricks-${player.id}" 
                    name="tricks-${player.id}" 
                    class="tricks-input"
                    min="0" 
                    max="${player.handCount}" 
                    value="0"
                    required
                >
                <span class="input-hint">0 to ${player.handCount}</span>
            `;

            const bonusGroup = document.createElement('div');
            bonusGroup.className = 'form-group';
            bonusGroup.innerHTML = `
                <label for="bonus-${player.id}">Bonus Points</label>
                <input 
                    type="number" 
                    id="bonus-${player.id}" 
                    name="bonus-${player.id}" 
                    class="bonus-input"
                    value="0"
                    min="0"
                    required
                >
                <span class="input-hint">default 0</span>
            `;

            const scoreDisplay = document.createElement('div');
            scoreDisplay.className = 'score-display';
            scoreDisplay.id = `score-${player.id}`;
            scoreDisplay.innerHTML = `<span class="score-label">Score:</span><span class="score-value">0</span>`;

            card.appendChild(playerName);
            card.appendChild(bidDisplay);
            card.appendChild(tricksGroup);
            card.appendChild(bonusGroup);
            card.appendChild(scoreDisplay);

            return card;
        }

        // Validate form before submission
        function validateForm() {
            let isValid = true;
            const formData = {};

            players.forEach(player => {
                const tricksInput = document.getElementById(`tricks-${player.id}`);
                const bonusInput = document.getElementById(`bonus-${player.id}`);
                
                const tricks = parseInt(tricksInput.value, 10);
                const bonus = parseInt(bonusInput.value, 10);

                // Check tricks are within range
                if (isNaN(tricks) || tricks < 0 || tricks > player.handCount) {
                    tricksInput.classList.add('input-error');
                    isValid = false;
                } else {
                    tricksInput.classList.remove('input-error');
                }

                // Check bonus are non-negative
                if (isNaN(bonus) || bonus < 0) {
                    bonusInput.classList.add('input-error');
                    isValid = false;
                } else {
                    bonusInput.classList.remove('input-error');
                }

                formData[player.id] = { tricks, bonus };
            });

            return { isValid, formData };
        }

        // Update calculated scores
        function updateScores() {
            const { isValid, formData } = validateForm();

            if (isValid) {
                players.forEach(player => {
                    const tricks = formData[player.id].tricks;
                    const bonus = formData[player.id].bonus;
                    const bid = player.bid;
                    
                    // Score calculation: if tricks == bid, score = bid + bonus; otherwise score = 0 + bonus
                    let score = (tricks === bid) ? bid + bonus : 0 + bonus;
                    
                    scores[player.id] = { tricks, bonus, score };
                    
                    const scoreDisplay = document.getElementById(`score-${player.id}`);
                    const scoreValue = scoreDisplay.querySelector('.score-value');
                    scoreValue.textContent = score;
                });

                // Check if all inputs are valid to enable next button
                checkFormCompletion();
            }
        }

        // Check if form is complete and valid
        function checkFormCompletion() {
            const { isValid } = validateForm();
            const nextBtn = document.getElementById('nextRoundBtn');
            
            if (isValid) {
                nextBtn.disabled = false;
            } else {
                nextBtn.disabled = true;
            }
        }

        // Form submission
        function submitForm(e) {
            e.preventDefault();
            const { isValid, formData } = validateForm();

            if (!isValid) {
                alert('Please correct errors in the form.');
                return;
            }

            console.log('Scores submitted for round ' + currentRound + ':', scores);
            alert('Scores submitted successfully!');
            // Here you would typically send the data to a backend or game logic
        }

        // Reset form
        function resetForm() {
            document.getElementById('scoringForm').reset();
            players.forEach(player => {
                document.getElementById(`tricks-${player.id}`).value = '0';
                document.getElementById(`bonus-${player.id}`).value = '0';
                document.getElementById(`score-${player.id}`).querySelector('.score-value').textContent = '0';
            });
            checkFormCompletion();
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            initializeForm();
            document.getElementById('totalRounds').textContent = totalRounds;
            document.getElementById('scoringForm').addEventListener('submit', submitForm);
            document.getElementById('resetBtn').addEventListener('click', resetForm);
            
            // Update scores on input change
            const form = document.getElementById('scoringForm');
            form.addEventListener('change', updateScores);
            form.addEventListener('input', updateScores);
        });
    </script>
</body>
</html>
