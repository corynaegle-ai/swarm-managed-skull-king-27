<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Score Entry - Tricks Game</title>
    <link rel="stylesheet" href="css/scoring.css">
</head>
<body>
    <div class="scoring-container">
        <div class="scoring-header">
            <h1>Score Entry</h1>
            <p class="round-info">Round <span id="currentRound">1</span> of <span id="totalRounds">13</span> - Enter tricks taken and bonus points</p>
        </div>

        <form class="scoring-form" id="scoringForm">
            <div class="players-grid" id="playersGrid">
                <!-- Player cards will be dynamically inserted here -->
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary" id="submitBtn">Submit Scores</button>
                <button type="reset" class="btn btn-secondary" id="resetBtn">Clear Form</button>
            </div>
        </form>

        <nav class="round-navigation">
            <button type="button" class="btn btn-nav" id="prevRoundBtn" disabled>← Previous Round</button>
            <div class="round-display" id="roundDisplay">Round 1</div>
            <button type="button" class="btn btn-nav" id="nextRoundBtn" disabled>Next Round →</button>
        </nav>
    </div>

    <script src="js/scoring.js"></script>
</body>
</html>
