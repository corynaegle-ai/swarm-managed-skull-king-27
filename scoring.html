<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoring - Tricks Game</title>
    <link rel="stylesheet" href="css/scoring.css">
</head>
<body>
    <div class="scoring-container">
        <header class="scoring-header">
            <h1>Round Scoring</h1>
            <p class="round-info">Enter tricks taken and bonus points for each player</p>
        </header>

        <form class="scoring-form" id="scoringForm">
            <div class="players-grid" id="playersGrid">
                <!-- Player cards will be populated by JavaScript -->
            </div>

            <div class="form-actions">
                <button type="button" class="btn btn-secondary" id="resetBtn">Reset</button>
                <button type="submit" class="btn btn-primary" id="submitBtn">Submit Scores</button>
            </div>
        </form>

        <div class="round-navigation">
            <button type="button" class="btn btn-nav" id="prevRoundBtn" disabled>← Previous Round</button>
            <div class="round-display" id="roundDisplay">Round <span id="currentRound">1</span> of <span id="totalRounds">13</span></div>
            <button type="button" class="btn btn-nav" id="nextRoundBtn" disabled>Next Round →</button>
        </div>
    </div>

    <script>
        // Mock player data - in a real app, this would come from previous game state
        const players = [
            { id: 1, name: 'Player 1', bid: 3, handCount: 5 },
            { id: 2, name: 'Player 2', bid: 2, handCount: 5 },
            { id: 3, name: 'Player 3', bid: 4, handCount: 5 },
            { id: 4, name: 'Player 4', bid: 1, handCount: 5 }
        ];

        let currentRound = 1;
        const totalRounds = 13;
        const scores = {};

        // Initialize the form with player cards
        function initializeForm() {
            const playersGrid = document.getElementById('playersGrid');
            playersGrid.innerHTML = '';

            players.forEach(player => {
                const playerCard = createPlayerCard(player);
                playersGrid.appendChild(playerCard);
                
                // Initialize score tracking
                if (!scores[player.id]) {
                    scores[player.id] = { tricks: 0, bonus: 0, score: 0 };
                }
            });
        }

        // Create individual player card
        function createPlayerCard(player) {
            const card = document.createElement('div');
            card.className = 'player-card';
            card.dataset.playerId = player.id;

            const playerName = document.createElement('div');
            playerName.className = 'player-name';
            playerName.textContent = player.name;

            const bidDisplay = document.createElement('div');
            bidDisplay.className = 'bid-display';
            bidDisplay.innerHTML = `<span class="bid-label">Bid:</span><span class="bid-value">${player.bid}</span>`;

            const tricksGroup = document.createElement('div');
            tricksGroup.className = 'form-group';
            tricksGroup.innerHTML = `
                <label for="tricks-${player.id}">Tricks Taken</label>
                <input 
                    type="number" 
                    id="tricks-${player.id}" 
                    name="tricks-${player.id}" 
                    class="tricks-input"
                    min="0" 
                    max="${player.handCount}" 
                    value="0"
                    required
                >
                <span class="input-hint">0 to ${player.handCount}</span>
            `;

            const bonusGroup = document.createElement('div');
            bonusGroup.className = 'form-group';
            bonusGroup.innerHTML = `
                <label for="bonus-${player.id}">Bonus Points</label>
                <input 
                    type="number" 
                    id="bonus-${player.id}" 
                    name="bonus-${player.id}" 
                    class="bonus-input"
                    min="0" 
                    value="0"
                    required
                >
                <span class="input-hint">Default: 0</span>
            `;

            const scoreDisplay = document.createElement('div');
            scoreDisplay.className = 'score-display';
            scoreDisplay.innerHTML = `
                <span class="score-label">Round Score:</span>
                <span class="score-value" id="score-${player.id}">0</span>
            `;

            card.appendChild(playerName);
            card.appendChild(bidDisplay);
            card.appendChild(tricksGroup);
            card.appendChild(bonusGroup);
            card.appendChild(scoreDisplay);

            return card;
        }

        // Calculate score for a player
        function calculateScore(playerId) {
            const player = players.find(p => p.id === playerId);
            const tricksInput = document.getElementById(`tricks-${playerId}`);
            const bonusInput = document.getElementById(`bonus-${playerId}`);
            const scoreDisplay = document.getElementById(`score-${playerId}`);

            const tricks = parseInt(tricksInput.value) || 0;
            const bonus = parseInt(bonusInput.value) || 0;
            const bid = player.bid;

            let score = 0;
            if (tricks === bid) {
                // Player made their bid
                score = bid * 10 + bonus;
            } else {
                // Player did not make their bid
                score = -Math.abs(tricks - bid) * 10;
            }

            scores[playerId].tricks = tricks;
            scores[playerId].bonus = bonus;
            scores[playerId].score = score;

            scoreDisplay.textContent = score;
        }

        // Check if all form fields are filled
        function isFormValid() {
            const inputs = document.querySelectorAll('.tricks-input, .bonus-input');
            for (const input of inputs) {
                const value = input.value.trim();
                if (value === '' || isNaN(parseInt(value))) {
                    return false;
                }
            }
            return true;
        }

        // Update next round button state
        function updateNextRoundButton() {
            const nextBtn = document.getElementById('nextRoundBtn');
            if (isFormValid() && currentRound < totalRounds) {
                nextBtn.disabled = false;
            } else {
                nextBtn.disabled = true;
            }
        }

        // Reset form to initial state
        function resetForm() {
            const inputs = document.querySelectorAll('.tricks-input, .bonus-input');
            inputs.forEach(input => {
                input.value = '0';
            });
            
            // Recalculate all scores
            players.forEach(player => {
                calculateScore(player.id);
            });
            
            updateNextRoundButton();
        }

        // Handle form submission
        function handleFormSubmit(e) {
            e.preventDefault();
            if (isFormValid()) {
                console.log('Scores submitted:', scores);
                alert('Scores submitted for round ' + currentRound);
            } else {
                alert('Please fill in all fields before submitting.');
            }
        }

        // Handle round navigation
        function handlePrevRound() {
            if (currentRound > 1) {
                currentRound--;
                updateRoundDisplay();
                updateNavigationButtons();
                resetForm();
            }
        }

        function handleNextRound() {
            if (isFormValid() && currentRound < totalRounds) {
                currentRound++;
                updateRoundDisplay();
                updateNavigationButtons();
                resetForm();
            }
        }

        function updateRoundDisplay() {
            document.getElementById('currentRound').textContent = currentRound;
        }

        function updateNavigationButtons() {
            const prevBtn = document.getElementById('prevRoundBtn');
            const nextBtn = document.getElementById('nextRoundBtn');
            
            prevBtn.disabled = currentRound <= 1;
            updateNextRoundButton();
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            initializeForm();
            updateNavigationButtons();

            // Add event listeners
            document.getElementById('scoringForm').addEventListener('submit', handleFormSubmit);
            document.getElementById('resetBtn').addEventListener('click', resetForm);
            document.getElementById('prevRoundBtn').addEventListener('click', handlePrevRound);
            document.getElementById('nextRoundBtn').addEventListener('click', handleNextRound);

            // Add listeners for input changes
            document.querySelectorAll('.tricks-input, .bonus-input').forEach(input => {
                input.addEventListener('change', function() {
                    const playerId = parseInt(this.id.split('-')[1]);
                    calculateScore(playerId);
                    updateNextRoundButton();
                });
                input.addEventListener('input', function() {
                    const playerId = parseInt(this.id.split('-')[1]);
                    calculateScore(playerId);
                    updateNextRoundButton();
                });
            });
        });
    </script>
</body>
</html>
