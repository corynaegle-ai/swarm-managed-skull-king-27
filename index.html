<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skull King - Bid Collection</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app-container" class="app-container">
    <header class="app-header">
      <h1>Skull King Game</h1>
      <div id="game-status" class="game-status">
        <div id="round-info" class="round-info">Round 1 of 10</div>
        <div id="phase-indicator" class="phase-indicator">Bidding Phase</div>
      </div>
    </header>

    <main class="app-main">
      <!-- Round and Phase Information -->
      <section class="game-info-section">
        <h2>Game Info</h2>
        <div class="info-content">
          <p id="round-display">Round: <span id="round-number">1</span>/10</p>
          <p id="phase-display">Phase: <span id="current-phase">Bidding</span></p>
        </div>
      </section>

      <!-- Player Scores Table -->
      <section class="player-scores-section">
        <h2>Player Scores</h2>
        <table id="player-scores-table" class="scores-table">
          <thead>
            <tr>
              <th>Player</th>
              <th>Score</th>
            </tr>
          </thead>
          <tbody>
            <!-- Populated by JavaScript -->
          </tbody>
        </table>
      </section>

      <!-- Bid Phase Container -->
      <section id="bid-phase-container" class="bid-phase-container">
        <!-- Bid interface will be rendered here dynamically -->
      </section>

      <!-- Final Scores Screen -->
      <section id="final-scores-screen" class="final-scores-screen hidden">
        <div class="final-scores-overlay">
          <div class="final-scores-modal">
            <h2>Game Over - Final Scores</h2>
            <div class="final-scores-content">
              <!-- Populated by JavaScript -->
            </div>
            <button id="new-game-btn" class="new-game-button">Play Again</button>
          </div>
        </div>
      </section>
    </main>

    <footer class="app-footer">
      <p>&copy; 2024 Skull King Game</p>
    </footer>
  </div>

  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/bid-phase.js"></script>
</body>
</html>
