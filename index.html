<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skull King - Bid Collection</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app-container" class="app-container">
    <header class="app-header">
      <h1>Skull King Game</h1>
      <div id="game-status" class="game-status"></div>
    </header>

    <main class="app-main">
      <!-- Round Info Container -->
      <section id="round-info-container" class="round-info-container">
        <div id="round-display"></div>
      </section>

      <!-- Game Phase Container -->
      <section id="game-phase-container" class="game-phase-container">
        <!-- Bid Phase Container -->
        <div id="bid-phase-container" class="bid-phase-container">
          <!-- Bid interface will be rendered here dynamically -->
        </div>

        <!-- Scoring Phase Container -->
        <div id="scoring-phase-container" class="scoring-phase-container" style="display: none;">
          <!-- Scoring interface will be rendered here dynamically -->
        </div>
      </section>

      <!-- Player Scores Container -->
      <section id="player-scores-container" class="player-scores-container">
        <h2>Player Scores</h2>
        <div id="scores-display"></div>
      </section>

      <!-- Final Scores Container -->
      <section id="final-scores-container" class="final-scores-container" style="display: none;">
        <div id="final-scores-display"></div>
      </section>
    </main>

    <footer class="app-footer">
      <p>&copy; 2024 Skull King Game</p>
    </footer>
  </div>

  <script type="module" src="js/bid-phase.js"></script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
